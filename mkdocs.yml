site_name: py-onramp
site_description: An onramp to the modern data and scientific Python workflow.
repo_url: https://github.com/Tufts-University/py-onramp
repo_name: Tufts-University/py-onramp
edit_uri: edit/master/docs/
docs_dir: docs
site_dir: site
strict: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Packaging: packaging.md
  - Testing: testing.md

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: teal
      accent: blue
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: teal
      accent: blue

plugins:
  - search

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      base_path:
        - .
      check_paths: true
  - pymdownx.superfences
